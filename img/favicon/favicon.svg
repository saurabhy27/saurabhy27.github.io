<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#070812"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#223055" stroke-width="4"/>
  <!-- Terminal prompt bracket -->
  <text x="80" y="390" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="120" font-weight="700" fill="#223055" opacity="0.6">&gt;_</text>
  <!-- Main S letter -->
  <text x="256" y="370" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="340" font-weight="800" fill="url(#accent)" filter="url(#glow)">S</text>
</svg>
